name: Frontend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npx prettier --check "src/**/*.{ts,tsx,css,json}"

  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

  bundle-analysis:
    name: Bundle Size Analysis
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Production build (required for size check)
        run: npm run build
      - name: Check initial route bundle size (< 200 KB gzipped)
        # Next.js 16 / Turbopack uses rootMainFiles + polyfillFiles in build-manifest.json.
        # Fall back to pages['/'] for older Webpack-based builds.
        run: |
          echo "=== Checking initial / route bundle size ==="
          node - <<'EOF'
          const fs = require('fs');
          const path = require('path');
          const zlib = require('zlib');

          const manifestPath = '.next/build-manifest.json';
          if (!fs.existsSync(manifestPath)) {
            console.log('build-manifest.json not found — skipping size check');
            process.exit(0);
          }

          const manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));

          // Turbopack (Next.js 16) uses rootMainFiles + polyfillFiles
          // Webpack uses pages['/']
          let rootChunks =
            manifest.pages?.['/'] ??
            manifest.pages?.['index'] ??
            [];

          if (rootChunks.length === 0) {
            // Turbopack mode — use rootManFiles + polyfillFiles
            rootChunks = [
              ...(manifest.rootMainFiles ?? []),
              ...(manifest.polyfillFiles ?? []),
            ];
            console.log('Turbopack manifest detected — using rootMainFiles + polyfillFiles');
          }

          if (rootChunks.length === 0) {
            console.log('No chunks found — skipping check');
            process.exit(0);
          }

          let totalGzip = 0;
          for (const chunk of rootChunks) {
            const filePath = path.join('.next', chunk);
            if (!fs.existsSync(filePath)) continue;
            const raw = fs.readFileSync(filePath);
            const compressed = zlib.gzipSync(raw);
            totalGzip += compressed.length;
          }

          const totalKB = (totalGzip / 1024).toFixed(1);
          const limitKB = 200;

          console.log(
            `Initial / route total gzipped JS: ${totalKB} KB (limit: ${limitKB} KB)`
          );

          if (totalGzip > limitKB * 1024) {
            console.error(
              `FAIL: Initial bundle ${totalKB} KB exceeds the ${limitKB} KB gzip threshold.`
            );
            console.error(
              'Ensure @stellar/* SDKs are not imported in the root layout or / route.'
            );
            process.exit(1);
          }

          console.log(`PASS: Initial bundle is within the ${limitKB} KB gzip threshold.`);
          EOF
      - name: Run Turbopack bundle analyzer
        # next experimental-analyze generates an interactive report under .next/analyze/
        # and may start an HTTP server. Timeout after 30s to avoid hanging CI.
        run: timeout 30 npx next experimental-analyze 2>&1 || true
      - name: Upload bundle report artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bundle-report
          path: .next/analyze/
          retention-days: 14

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx vitest run --reporter=verbose

  pwa:
    name: PWA Audit
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Pre-generate lightweight SVG chart thumbnails to prevent server-side
      # image-processing bottlenecks (WebP conversion) and layout shift (CLS)
      # when many device thumbnails load concurrently on the dashboard.
      - name: Generate chart thumbnails (pre-build)
        run: node scripts/generate-thumbnails.mjs
      - run: npm run build
      - name: Start production server
        run: |
          npx next start -p 3000 &
          echo $! > ${{ runner.temp }}/server.pid
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            sleep 1
          done
      - name: Run Lighthouse CI
        env:
          CHROME_FLAGS: '--no-sandbox --headless'
        run: |
          npm i -g @lhci/cli@0.14.x
          lhci collect --url=http://localhost:3000 --url=http://localhost:3000/dashboard
      - name: Assert Lighthouse Budgets (CLS ≤ 0.1, LCP ≤ 2.5s)
        run: |
          lhci assert \
            --assertions.cumulative-layout-shift='["error", {"maxNumericValue": 0.1}]' \
            --assertions.largest-contentful-paint='["error", {"maxNumericValue": 2500}]' \
            --assertions.interactive='["warn", {"maxNumericValue": 5000}]' \
            --assertions.total-blocking-time='["warn", {"maxNumericValue": 300}]'
      - name: Stop server
        if: always()
        run: |
          if [ -f "${{ runner.temp }}/server.pid" ]; then
            kill $(cat "${{ runner.temp }}/server.pid") 2>/dev/null || true
          fi
